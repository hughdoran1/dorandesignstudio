  <!-- Dot Grid JS -->
  <script>
    (function initDotGrids() {
      const GRID_COLUMNS = 12;
      const DOTS_PER_GRID_UNIT = 7;
      let sharedGridWidth = null;

      function applyDotGrid(gridElement) {
        if (sharedGridWidth === null) sharedGridWidth = gridElement.offsetWidth;
        const gridWidth = sharedGridWidth;
        const gap = 1;
        const totalGapWidth = gap * (GRID_COLUMNS + 1);
        const gridUnitWidth = (gridWidth - totalGapWidth) / GRID_COLUMNS;
        const dotSpacing = gridUnitWidth / 8;
        const dotColor = getComputedStyle(document.documentElement).getPropertyValue('--border-canvas').trim();
        const canvasColor = getComputedStyle(document.documentElement).getPropertyValue('--canvas').trim();
        const patternSize = gridUnitWidth + gap;
        const dotOffset = dotSpacing;
        let circles = '';
        for (let i = 0; i < DOTS_PER_GRID_UNIT; i++) {
          for (let j = 0; j < DOTS_PER_GRID_UNIT; j++) {
            const cx = dotOffset + (i * dotSpacing);
            const cy = dotOffset + (j * dotSpacing);
            circles += `<circle cx='${cx}' cy='${cy}' r='1.5' fill='${dotColor}'/>`;
          }
        }
        const svgPattern = `<svg xmlns='http://www.w3.org/2000/svg' width='${patternSize}' height='${patternSize}'><rect x='0' y='0' width='${gridUnitWidth}' height='${gridUnitWidth}' fill='${canvasColor}'/>${circles}</svg>`;
        const encodedSVG = `data:image/svg+xml,${encodeURIComponent(svgPattern)}`;
        gridElement.style.backgroundImage = `url("${encodedSVG}")`;
        gridElement.style.backgroundSize = `${patternSize}px ${patternSize}px`;
        gridElement.style.backgroundPosition = '0 0';
      }

      function updateGrids() {
        sharedGridWidth = null;
        const g = document.querySelector('.guides-grid');
        if (g) applyDotGrid(g);
      }

      setTimeout(updateGrids, 100);
      let t;
      window.addEventListener('resize', () => { clearTimeout(t); t = setTimeout(updateGrids, 150); });
    })();
  </script>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">

  <script>
    // DITA-inspired modular content database
    // Chunks are reusable content modules
    const chunks = {

        title: 'Introduction to Product Rendering',
        type: 'concept',
        content: 'Overview of digital product visualization strategies'

      'render-consistency': {
        id: 'render-consistency',
        title: 'Maintaining Visual Consistency',
        type: 'task',
        content: 'Step-by-step process for consistent product imagery'
      },
      'render-workflow': {
        id: 'render-workflow',
        title: 'Production Workflow Setup',
        type: 'task',
        content: 'Configuring your rendering pipeline for scale'
      },
      'sku-management': {
        id: 'sku-management',
        title: 'SKU Documentation Strategy',
        type: 'concept',
        content: 'Organizing documentation for product variants'
      },
      'asset-templates': {
        id: 'asset-templates',
        title: 'Reusable Asset Templates',
        type: 'reference',
        content: 'Template library for common product types'
      },
      'metadata-schema': {
        id: 'metadata-schema',
        title: 'Product Metadata Schema',
        type: 'reference',
        content: 'Structured data for product attributes'
      },
      'translation-prep': {
        id: 'translation-prep',
        title: 'Preparing for Translation',
        type: 'task',
        content: 'Structuring content for localization'
      },
      'global-standards': {
        id: 'global-standards',
        title: 'Global Compliance Standards',
        type: 'reference',
        content: 'Regional requirements and regulations'
      },
      'market-adaptation': {
        id: 'market-adaptation',
        title: 'Market-Specific Adaptation',
        type: 'task',
        content: 'Customizing content for different markets'
      }
    };

    // Articles are composed of chunks in a specific order (the "map")
    const articles = [
      {
        id: 'digital-product-renders',
        title: 'Digital Product Renders Strategy',
        description: 'Consistent product visualization across your product portfolio',
        icon: 'view_in_ar',
        color: '#3366FF',
        type: 'STRATEGY GUIDE',
        // Map defines the order: B - A - C pattern
        chunkMap: ['render-consistency', 'render-intro', 'render-workflow'],
        estimatedTime: '15 min read',
        category: 'Visual Design'
      },
      {
        id: 'sku-documentation',
        title: 'Managing SKU Documentation at Scale',
        description: 'Modular documentation systems for product variant management',
        icon: 'inventory_2',
        color: '#0A8754',
        type: 'PROCESS GUIDE',
        chunkMap: ['asset-templates', 'sku-management', 'metadata-schema'],
        estimatedTime: '20 min read',
        category: 'Documentation'
      },
      {
        id: 'global-markets',
        title: 'Multi-Market Product Communication',
        description: 'Localizing product content for global audiences',
        icon: 'language',
        color: '#F58F29',
        type: 'STRATEGY GUIDE',
        chunkMap: ['translation-prep', 'global-standards', 'market-adaptation'],
        estimatedTime: '18 min read',
        category: 'Localization'
      },
      {
        id: 'modular-content',
        title: 'Building Modular Content Systems',
        description: 'DITA-based approaches for reusable documentation chunks',
        icon: 'account_tree',
        color: '#00A9A5',
        type: 'TECHNICAL GUIDE',
        chunkMap: ['metadata-schema', 'asset-templates', 'sku-management'],
        estimatedTime: '25 min read',
        category: 'Information Architecture'
      },
      {
        id: 'visual-standards',
        title: 'Product Portfolio Visual Standards',
        description: 'Creating and maintaining consistent visual systems across products',
        icon: 'palette',
        color: '#FF3864',
        type: 'STANDARDS GUIDE',
        chunkMap: ['render-intro', 'asset-templates', 'render-consistency'],
        estimatedTime: '12 min read',
        category: 'Visual Design'
      },
    ];

    // Render guides to the page
    function renderGuides() {
      const container = document.getElementById('guidesGrid');

      articles.forEach(article => {
        const card = document.createElement('a');
        card.className = 'guide-card';
        card.href = `guide.html?id=${article.id}`;
        card.style.color = article.color;

        // Get chunk details for this article
        const chunks_list = article.chunkMap.map((chunkId, index) => {
          const chunk = chunks[chunkId];
          return `
            <div class="chunk-item">
              <span class="chunk-order">${index + 1}</span>
              <span class="chunk-name">${chunk.title}</span>
            </div>
          `;
        }).join('');

        card.innerHTML = `
          <div class="guide-content">
            <div class="guide-meta">
              <div class="guide-icon">
                <span class="material-icons">${article.icon}</span>
              </div>
              <div class="guide-type">${article.type}</div>
            </div>

            <h3 class="guide-title">${article.title}</h3>
            <p class="guide-description">${article.description}</p>

            <div class="guide-chunks">
              <div class="guide-chunks-label">Content Modules</div>
              ${chunks_list}
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', renderGuides);
  </script>
